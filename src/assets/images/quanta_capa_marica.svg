
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 595 842" width="100%" height="100%">
  <!-- White clean background -->
  <rect width="595" height="842" fill="#ffffff" />
  
  <!-- Shaded topographical contours mimicking coastal hills of Maricá -->
  <g opacity="0.12" stroke="#ea8658" stroke-width="1.5" fill="none">
    <path d="M-50,250 C100,280 150,150 250,180 C350,210 400,320 500,280 C600,240 650,300 700,350" />
    <path d="M-50,270 C120,300 170,170 270,200 C370,230 420,340 520,300 C620,260 670,320 720,370" />
    <path d="M-50,290 C140,320 190,190 290,220 C390,250 440,360 540,320 C640,280 690,340 740,390" />
    <path d="M-50,310 C160,340 210,210 310,240 C410,270 460,380 560,340 C660,300 710,360 760,410" />
    <path d="M-50,330 C180,360 230,230 330,260 C430,290 480,400 580,360 C680,320 730,380 780,430" />
    
    <!-- Secondary waves -->
    <path d="M-20,600 C150,620 200,500 350,550 C500,600 550,480 700,530" />
    <path d="M-20,620 C170,640 220,520 370,570 C520,620 570,500 720,550" />
    <path d="M-20,640 C190,660 240,540 390,590 C540,640 590,520 740,570" />
  </g>
  
  <!-- Subtle gradient glow -->
  <circle cx="300" cy="400" r="280" opacity="0.04" fill="#ea8658" />
  
  <!-- Bottom Corner Logo Frame -->
  <g transform="translate(420, 770)">
    <!-- Quanta Logo Vector representation -->
    <path d="M25,-12 D25,-12" stroke="#ea8658" stroke-width="3" fill="none" />
    <!-- Three orange arcs -->
    <path d="M-5,-5 A12,12 0 0,1 -5,-25" fill="none" stroke="#ea8658" stroke-width="3" stroke-linecap="round" />
    <path d="M-12,0 A19,19 0 0,1 -12,-30" fill="none" stroke="#ea8658" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="1 3" opacity="0.8" />
    <path d="M0,-10 A5,5 0 0,1 0,-20" fill="none" stroke="#ea8658" stroke-width="2" stroke-linecap="round" />
    <!-- Text QUANTA & CONSULTORIA -->
    <text x="18" y="-12" fill="#1e1e1e" font-family="'Inter', sans-serif" font-weight="bold" font-size="17" letter-spacing="2">QUANTA</text>
    <text x="18" y="-2" fill="#7a7a7a" font-family="'Inter', sans-serif" font-weight="regular" font-size="8" letter-spacing="1">GESTÃO &amp; ENGENHARIA</text>
  </g>
</svg>
